# 資料來源設定檔
# 定義所有開放資料來源的 OID、API endpoint 與更新頻率

sources:
  # ========================
  # 人口相關
  # ========================

  # 戶政歷年人口統計 (sample - household.chiayi.gov.tw 需 ASPX 爬蟲)
  - id: population_annual
    name: "嘉義市歷年人口統計"
    source: "household.chiayi.gov.tw"
    type: "sample"
    schedule: "monthly"
    output: "data/raw/population_annual.csv"

  # 區里戶數及人口數 (sample)
  - id: population_village
    name: "嘉義市區里戶數及人口數"
    source: "household.chiayi.gov.tw"
    type: "sample"
    schedule: "monthly"
    output: "data/raw/population_village_monthly.csv"

  # ========================
  # 預算相關 — 已確認可下載
  # ========================

  # 歲入來源別預算總表 (sample — 待補 RID)
  - id: budget_revenue
    name: "嘉義市政府歲入來源別預算總表"
    source: "data.chiayi.gov.tw"
    type: "sample"
    oid: "f6a1738a-7d73-4238-88e7-cfda69fdf9fd"
    schedule: "yearly"
    output: "data/raw/budget_revenue_115.csv"
